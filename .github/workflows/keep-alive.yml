name: Keep Supabase alive

on:
  schedule:
    - cron: '0 8 */3 * *'   # elke 3 dagen om 08:00 UTC
  workflow_dispatch:          # handmatig triggeren via GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            "https://owjccmlgfhbusncvmbac.supabase.co/rest/v1/checklist_state?id=eq.1&select=id" \
            -H "apikey: sb_publishable_m5WPUe6APhOqHUQZOpj0-g_XZxzTVB5" \
            -H "Authorization: Bearer sb_publishable_m5WPUe6APhOqHUQZOpj0-g_XZxzTVB5" \
            && echo "Supabase actief ✓" || echo "Ping mislukt"
